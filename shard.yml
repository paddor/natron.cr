name: natron
version: 0.1.0

description: |
  Crystal binding to libsodium. Covers Curve25519, XSalsa20-Poly1305,
  Salsa20/ChaCha20 stream ciphers, and the Box/SecretBox high-level
  constructions. Drop-in API-compatible with the pure-Crystal nuckle shard.

crystal: ">= 1.20.0"

license: ISC

authors:
  - Patrik Wenger <paddor@gmail.com>

development_dependencies:
  minitest:
    github: ysbaddaden/minitest.cr
